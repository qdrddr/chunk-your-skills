# End-to-end tests against published packages (crates.io, PyPI, npm).
# Does not use monorepo SDK sources — installs from public registries only.
#
# Runs after publish-crates.yml succeeds (workflow_run). Polls each registry until
# CYT_RELEASE_VERSION is installable, then runs isolated harnesses under sdk/e2e/.
# Wait steps use continue-on-error so a registry timeout still runs the test step
# (publish may still be in flight; the install/test step is the real gate).

name: 4. E2E published packages

on:
  workflow_run:
    workflows: ["1. Publish chunk-your-skills to crates.io"]
    types: [completed]

concurrency:
  group: e2e-published-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  resolve-version:
    name: Resolve release version
    if: |
      github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: parse
        env:
          GH_TOKEN: ${{ github.token }}
          PARENT_RUN_ID: ${{ github.event.workflow_run.id }}
        run: sdk/e2e/scripts/resolve-version-from-parent.sh

  e2e-rust:
    name: 1. E2E chunk-your-skills (crates.io)
    needs: resolve-version
    if: |
      github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      CYT_RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Render manifests
        run: sdk/e2e/scripts/render-manifests.sh

      - name: Wait for crates.io
        continue-on-error: true
        run: sdk/e2e/scripts/wait-registry.sh crate

      - name: Test published crate
        working-directory: sdk/e2e/rust
        run: cargo test

  e2e-python-sdk:
    name: 2. E2E chunk-your-skills (PyPI)
    needs: resolve-version
    if: |
      github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      CYT_RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3
        with:
          python-version: "3.13"
          enable-cache: false

      - name: Render manifests
        run: sdk/e2e/scripts/render-manifests.sh

      - name: Wait for PyPI (chunk-your-skills)
        continue-on-error: true
        run: sdk/e2e/scripts/wait-registry.sh pypi-sdk

      - name: Test published Python SDK
        working-directory: sdk/e2e/python
        run: |
          ../scripts/uv-sync-with-retry.sh --group test
          uv run pytest

  e2e-typescript:
    name: 2. E2E chunk-your-skills (npm)
    needs: resolve-version
    if: |
      github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      CYT_RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Render manifests
        run: sdk/e2e/scripts/render-manifests.sh

      - name: Wait for npm
        continue-on-error: true
        run: sdk/e2e/scripts/wait-registry.sh npm

      - name: Test published npm package
        working-directory: sdk/e2e/typescript
        run: |
          npm install
          npm test

  e2e-clear-your-tools:
    name: 3. E2E clear-your-tools (PyPI)
    needs: resolve-version
    if: |
      github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      CYT_RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3
        with:
          python-version: "3.13"
          enable-cache: false

      - name: Render manifests
        run: sdk/e2e/scripts/render-manifests.sh

      - name: Wait for PyPI (SDK then app)
        continue-on-error: true
        run: sdk/e2e/scripts/wait-registry.sh pypi-app

      - name: Test published app package
        working-directory: sdk/e2e/clear-your-tools
        env:
          CYT_RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          ../scripts/uv-sync-with-retry.sh --group test
          uv run pytest

  e2e-go:
    name: 4. E2E Go SDK (GitHub tag)
    needs: resolve-version
    if: |
      github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      CYT_RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Render manifests
        run: sdk/e2e/scripts/render-manifests.sh

      - name: Wait for GitHub tag
        continue-on-error: true
        run: sdk/e2e/scripts/wait-registry.sh tag

      - name: Test published Go module
        run: sdk/e2e/scripts/run-target.sh go

  e2e-c:
    name: 4. E2E C SDK (GitHub tag)
    needs: resolve-version
    if: |
      github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      CYT_RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Render manifests
        run: sdk/e2e/scripts/render-manifests.sh

      - name: Wait for GitHub tag
        continue-on-error: true
        run: sdk/e2e/scripts/wait-registry.sh tag

      - name: Test published C SDK
        run: sdk/e2e/scripts/run-target.sh c

