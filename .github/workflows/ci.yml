name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (chunk-your-skills)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust tests
        run: cargo test -p chunk-your-skills

      - name: Rust fmt
        run: cargo fmt --all -- --check

      - name: Rust clippy
        run: cargo clippy -p chunk-your-skills --all-targets --all-features -- -D warnings

      - name: Rust FFI smoke test
        run: cargo test -p chunk-your-skills --no-default-features --features ffi --test ffi_smoke

  sdk-python:
    name: Python SDK smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Python SDK
        working-directory: sdk/python
        run: |
          uv sync
          uv run maturin develop --release

      - name: Verify import
        working-directory: sdk/python
        run: uv run python -c "from chunk_your_skills._native import build_skills_index; assert callable(build_skills_index)"

      - name: Pytest
        working-directory: sdk/python
        run: uv run pytest tests

  test-typescript-sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: sdk/typescript
        run: npm ci

      - name: Build TypeScript SDK
        working-directory: sdk/typescript
        run: npm run build

      - name: Test TypeScript SDK
        working-directory: sdk/typescript
        run: npm test
