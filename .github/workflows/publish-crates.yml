# Publish chunk-your-skills to crates.io when a semver tag vX.Y.Z is pushed.

name: 1. Publish chunk-your-skills to crates.io

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-crate:
    name: Upload chunk-your-skills to crates.io
    runs-on: ubuntu-latest
    environment:
      name: crates
      url: https://crates.io/crates/chunk-your-skills
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Validate tag format
        if: github.event_name == 'push'
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag must be vX.Y.Z (e.g. v0.1.2), got: ${TAG}"
            exit 1
          fi

      - name: Set version from tag
        if: github.event_name == 'push'
        shell: bash
        working-directory: .
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "Setting chunk-your-skills version to ${VERSION} (from tag ${TAG})"
          cargo set-version "$VERSION"

      - name: Test crate
        run: cargo test -p chunk-your-skills

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        working-directory: .
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --allow-dirty

      - name: Prepare release version metadata
        if: github.event_name == 'push'
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          printf '%s' "${VERSION}" > cys-release-version.txt

      - name: Store release version artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: cys-release-version
          path: cys-release-version.txt
          if-no-files-found: error
