# End-to-end test for chunk-your-skills on PyPI after publish succeeds.

name: 4. E2E published (PyPI)

on:
  workflow_run:
    workflows:
      - "3. Publish chunk-your-skills to PyPI"
    types: [completed]

concurrency:
  group: e2e-published-pypi-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  resolve-version:
    name: Resolve release version
    if: |
      github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: parse
        env:
          GH_TOKEN: ${{ github.token }}
          PARENT_RUN_ID: ${{ github.event.workflow_run.id }}
        run: sdk/e2e/scripts/resolve-version-from-parent.sh

  e2e-python-sdk:
    name: 1. E2E chunk-your-skills (PyPI)
    needs: resolve-version
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      CYT_RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3
        with:
          python-version: "3.13"
          enable-cache: false

      - name: Render manifests
        run: sdk/e2e/scripts/render-manifests.sh

      - name: Wait for PyPI (chunk-your-skills)
        continue-on-error: true
        run: sdk/e2e/scripts/wait-registry.sh pypi-sdk

      - name: Test published Python SDK
        working-directory: sdk/e2e/python
        env:
          UV_SYNC_REGISTRY_TARGET: pypi-sdk
        run: |
          ../scripts/uv-sync-with-retry.sh --group test
          uv run pytest
