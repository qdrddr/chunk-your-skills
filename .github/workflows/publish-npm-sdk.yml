name: 2. Publish chunk-your-skills to npm

on:
  workflow_run:
    workflows: ["1. Publish chunk-your-skills to crates.io"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: Semver to wait for on crates.io (manual runs only)
        required: false

permissions:
  contents: read
  actions: read

jobs:
  resolve-version:
    name: Resolve release version
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: parse
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          PARENT_RUN_ID: ${{ github.event.workflow_run.id }}
        run: sdk/e2e/scripts/resolve-version-from-parent.sh

  wait-for-crate:
    name: Wait for chunk-your-skills on crates.io
    needs: resolve-version
    if: |
      (github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')) &&
      needs.resolve-version.outputs.version != ''
    runs-on: ubuntu-latest
    env:
      CYT_RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Wait for crates.io
        run: sdk/e2e/scripts/wait-registry.sh crate

  build-native:
    name: Build native (${{ matrix.target }})
    needs: [resolve-version, wait-for-crate]
    if: |
      (github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')) &&
      needs.resolve-version.result == 'success' &&
      (needs.wait-for-crate.result == 'success' || needs.wait-for-crate.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: true

      - name: Install dependencies
        working-directory: sdk/typescript
        run: npm ci

      - name: Set package version
        if: needs.resolve-version.outputs.version != ''
        working-directory: sdk/typescript
        run: |
          echo "Setting chunk-your-skills version to ${{ needs.resolve-version.outputs.version }}"
          npm version "${{ needs.resolve-version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Fetch Rust dependencies
        run: cargo fetch --target "${{ matrix.target }}"

      - name: Build native binding
        working-directory: sdk/typescript
        shell: bash
        run: |
          npx napi build --platform --release \
            --manifest-path ../../Cargo.toml \
            -p chunk-your-skills \
            --features node \
            --no-default-features \
            --output-dir . \
            --js native.cjs \
            --dts native.d.ts \
            --target "${{ matrix.target }}"

      - name: Stage native binding
        shell: bash
        run: |
          shopt -s nullglob
          files=(sdk/typescript/chunk-your-skills.*.node)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No .node file produced by napi build"
            ls -la sdk/typescript/
            exit 1
          fi
          mkdir -p "artifacts/bindings-${{ matrix.target }}"
          cp "${files[@]}" "artifacts/bindings-${{ matrix.target }}/"

      - name: Upload native binding
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.target }}
          path: artifacts/bindings-${{ matrix.target }}/
          if-no-files-found: error

      - name: Upload native loader stubs
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v7
        with:
          name: native-loader-stubs
          path: |
            sdk/typescript/native.cjs
            sdk/typescript/native.d.ts
          if-no-files-found: error

  publish:
    name: Upload SDK to npm
    needs: [build-native, resolve-version]
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    environment:
      name: npm-sdk
      url: https://www.npmjs.com/package/chunk-your-skills
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: sdk/typescript
        run: npm ci

      - name: Set package version
        if: needs.resolve-version.outputs.version != ''
        working-directory: sdk/typescript
        run: |
          npm version "${{ needs.resolve-version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Download native loader stubs
        uses: actions/download-artifact@v7
        with:
          name: native-loader-stubs
          path: sdk/typescript

      - name: Download native bindings
        uses: actions/download-artifact@v7
        with:
          pattern: bindings-*
          merge-multiple: true
          path: sdk/typescript/artifacts

      - name: Stage all platform binaries in package root
        working-directory: sdk/typescript
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          while IFS= read -r -d '' file; do
            mv -f "$file" .
          done < <(find artifacts -name '*.node' -print0)
          rm -rf artifacts
          mapfile -t nodes < <(find . -maxdepth 1 -name 'chunk-your-skills.*.node' -print | sort)
          expected=6
          if [ "${#nodes[@]}" -ne "${expected}" ]; then
            echo "::error::Expected ${expected} platform .node files in package root, found ${#nodes[@]}"
            printf '%s\n' "${nodes[@]}"
            exit 1
          fi

      - name: Build JavaScript package
        working-directory: sdk/typescript
        run: npm run build:js

      - name: Publish to npm
        working-directory: sdk/typescript
        run: npm publish --access public
